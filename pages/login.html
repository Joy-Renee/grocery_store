<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FreshCart</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo">🥦 FreshCart</a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
        <span id="auth-link"></span>
      </div>
    </div>
  </header>

  <main>
    <section class="form-section">
      <div class="form-card">
        <h1>Login</h1>

        <form id="login-form">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>

          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>

          <p id="login-message" class="form-message"></p>

          <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <p class="form-footer-text">Don't have an account? <a href="signup.html">Sign up here</a></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-column">
        <h4>FreshCart</h4>
        <p>Your trusted online grocery food market.</p>
      </div>
      <div class="footer-column">
        <h4>Quick Links</h4>
        <a href="products.html">Products</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
      <div class="footer-column">
        <h4>Account</h4>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
      </div>
    </div>
    <p class="footer-bottom">&copy; 2026 FreshCart. University Project - Not a real store.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
