<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - FreshCart</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ===== NAVIGATION BAR ===== -->
  <header class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo">🥦 FreshCart</a>

      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="nav-actions">
        <a href="cart.html" class="cart-link">
          🛒 Cart (<span id="cart-count">0</span>)
        </a>
        <span id="auth-link"></span>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main>
    <section class="page-header">
      <h1>Our Products</h1>
      <p>Browse fresh groceries by category</p>
    </section>

    <section class="catalogue">
      <!-- Category filter buttons -->
      <div class="filter-bar">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="fruits">Fruits</button>
        <button class="filter-btn" data-category="vegetables">Vegetables</button>
        <button class="filter-btn" data-category="dairy">Dairy</button>
        <button class="filter-btn" data-category="bakery">Bakery</button>
        <button class="filter-btn" data-category="pantry">Pantry</button>
      </div>

      <!-- Product cards get inserted here by JavaScript -->
      <div id="product-list" class="product-grid">
      </div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-column">
        <h4>FreshCart</h4>
        <p>Your trusted online grocery food market.</p>
      </div>
      <div class="footer-column">
        <h4>Quick Links</h4>
        <a href="products.html">Products</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
      <div class="footer-column">
        <h4>Account</h4>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
      </div>
    </div>
    <p class="footer-bottom">&copy; 2026 FreshCart. University Project - Not a real store.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
