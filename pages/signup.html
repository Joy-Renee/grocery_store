<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FreshCart</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo">🥦 FreshCart</a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
        <span id="auth-link"></span>
      </div>
    </div>
  </header>

  <main>
    <section class="form-section">
      <div class="form-card">
        <h1>Create an Account</h1>

        <!-- We use type="button" (not "submit") so the page never reloads.
             JavaScript handles everything through the click event. -->
        <form id="signup-form">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" required>

          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" required>

          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" required minlength="6">

          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" required minlength="6">

          <!-- Error/success messages appear here -->
          <p id="signup-message" class="form-message"></p>

          <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>

        <p class="form-footer-text">Already have an account? <a href="login.html">Login here</a></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-column">
        <h4>FreshCart</h4>
        <p>Your trusted online grocery food market.</p>
      </div>
      <div class="footer-column">
        <h4>Quick Links</h4>
        <a href="products.html">Products</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
      <div class="footer-column">
        <h4>Account</h4>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
      </div>
    </div>
    <p class="footer-bottom">&copy; 2026 FreshCart. University Project - Not a real store.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
