<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - FreshCart</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo">🥦 FreshCart</a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
        <span id="auth-link"></span>
      </div>
    </div>
  </header>

  <main>
    <section class="page-header">
      <h1>Checkout</h1>
    </section>

    <section class="checkout-section">
      <!-- Order review, built by JavaScript from cart + shipping info in localStorage -->
      <div id="checkout-summary" class="checkout-summary">
      </div>

      <div class="form-card">
        <h3>Payment Details (Simulation Only)</h3>
        <form id="checkout-form" novalidate>

          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="mpesa" checked>
              M-Pesa
            </label>

            <label class="payment-option">
              <input type="radio" name="payment" value="card">
              Credit/Debit Card
            </label>

            <label class="payment-option">
              <input type="radio" name="payment" value="cash">
              Cash on Delivery
            </label>
          </div>

          <div id="mpesa-fields" class="payment-fields">
            <label for="mpesa-phone">M-Pesa Phone Number</label>
            <input type="text" id="mpesa-phone" placeholder="07XXXXXXXX">
          </div>

          <div id="card-fields" class="payment-fields hidden">
            <label for="card-name">Name on Card</label>
            <input type="text" id="card-name" required>

            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" required>

            <label for="card-expiry">Expiry (MM/YY)</label>
            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>

            <label for="card-cvv">CVV</label>
            <input type="text" id="card-cvv" maxlength="4" required>
          </div>

          <p id="checkout-message" class="form-message"></p>

          <button type="submit" class="btn btn-primary">Place Order</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-column">
        <h4>FreshCart</h4>
        <p>Your trusted online grocery food market.</p>
      </div>
      <div class="footer-column">
        <h4>Quick Links</h4>
        <a href="products.html">Products</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
      <div class="footer-column">
        <h4>Account</h4>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
      </div>
    </div>
    <p class="footer-bottom">&copy; 2026 FreshCart. University Project - Not a real store.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
